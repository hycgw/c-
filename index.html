                    {sId:502, sTitle:"5.2 break穿透问题详解", content:`<h3 class="text-xl font-semibold mb-4">break关键字作用</h3><p class="text-gray-700 mb-3">缺少break会发生穿透，匹配成功后继续执行下方所有case代码</p><p class="text-red-600 font-medium mb-3">常规场景每个case末尾必须加break终止分支</p>`},
                    {sId:503, sTitle:"5.3 实战：数字转星期程序", content:`<h3 class="text-xl font-semibold mb-4">完整星期匹配代码</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds overflow-x-auto">#include &lt;iostream&gt;using namespace std;int main(){int day;cin >> day;switch(day){case 1:cout << "周一";break;case 2:cout << "周二";break;case 3:cout << "周三";break;case 4:cout << "周四";break;case 5:cout << "周五";break;case 6:cout << "周六";break;case 7:cout << "周日";break;default:cout << "输入错误";}return 0;}</pre><div class="bg-slate-100 p-4 rounded-ds mt-6"><h5 class="font-medium mb-2">练习</h5><p>使用switch实现简易计算器：1加法2减法3乘法4除法</p></div>`}
                ]
            },
            {
                id:6, title:"第6课 for循环与双层循环",
                sections:[
                    {sId:601, sTitle:"6.1 for循环完整结构", content:`<h3 class="text-xl font-semibold mb-4">for循环三要素</h3><p class="text-gray-700 mb-3">适合已知循环次数场景：初始值;循环条件;自增/自减</p><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">for(int i=1; i<=10; i++){cout << i << endl;}</pre><p class="text-gray-700 mt-3">代码功能：循环打印1~10全部数字</p>`},
                    {sId:602, sTitle:"6.2 双层for循环 九九乘法表", content:`<h3 class="text-xl font-semibold mb-4">双层循环嵌套案例</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds overflow-x-auto">#include &lt;iostream&gt;using namespace std;int main(){for(int i=1;i<=9;i++){for(int j=1;j<=i;j++){cout << j << "*" << i << "=" << i*j << "\t";}cout << endl;}return 0;}</pre><p class="text-gray-700 mt-4">外层控制行数，内层控制每行打印数量</p>`},
                    {sId:603, sTitle:"6.3 break跳出循环 continue跳过单次", content:`<h3 class="text-xl font-semibold mb-4">循环控制关键字</h3><ul class="list-disc pl-6 space-y-2 text-gray-700 mb-4"><li>break：直接终止整个循环，跳出循环体</li><li>continue：仅跳过本次循环剩余代码，直接进入下一轮循环</li></ul><div class="bg-slate-100 p-4 rounded-ds mt-6"><h5 class="font-medium mb-2">练习</h5><p>循环1~100，只打印偶数，遇到50直接结束循环</p></div>`}
                ]
            },
            {
                id:7, title:"第7课 while / do while循环",
                sections:[
                    {sId:701, sTitle:"7.1 while先判断后执行", content:`<h3 class="text-xl font-semibold mb-4">while循环语法</h3><p class="text-gray-700 mb-3">未知循环次数优先使用，先判断条件，条件不成立一次都不执行</p><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">int i=1;while(i<=10){cout << i;i++;}</pre>`},
                    {sId:702, sTitle:"7.2 do while至少执行一次", content:`<h3 class="text-xl font-semibold mb-4">do while结构</h3><p class="text-gray-700 mb-3">先运行循环体，后判断条件，无论条件真假至少执行一遍</p><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">int i=1;do{cout << i;i++;}while(i<=10);</pre>`},
                    {sId:703, sTitle:"7.3 综合实战：猜数字小游戏", content:`<h3 class="text-xl font-semibold mb-4">完整循环小游戏代码</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds overflow-x-auto">#include &lt;iostream&gt;using namespace std;int main(){int target = 66;int input;while(true){cout << "猜数字(1-100)：";cin >> input;if(input > target){cout << "太大" << endl;}else if(input < target){cout << "太小" << endl;}else{cout << "猜对了！";break;}}return 0;}</pre>`}
                ]
            },
            {
                id:8, title:"第8课 一维数组与二维数组",
                sections:[
                    {sId:801, sTitle:"8.1 一维数组定义遍历", content:`<h3 class="text-xl font-semibold mb-4">数组批量存储同类型数据</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">// 定义5个int数组int arr[5] = {10,20,30,40,50};// 下标从0开始cout << arr[0]; // 输出10</pre><p class="text-gray-700 mt-3 mb-4">数组下标从0起始，循环可批量读取全部元素</p>`},
                    {sId:802, sTitle:"8.2 数组求和、最大值最小值", content:`<h3 class="text-xl font-semibold mb-4">数组统计案例</h3><p class="text-gray-700 mb-3">循环遍历数组，累加求和、对比找出最值</p>`},
                    {sId:803, sTitle:"8.3 二维数组矩阵表格", content:`<h3 class="text-xl font-semibold mb-4">二维数组行列存储</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">int map[2][3] = {{1,2,3},{4,5,6}};</pre><p class="text-gray-700 mt-3">适合表格、棋盘、矩阵类数据存储</p>`}

            {

                sections:[
                    {sId:901, sTitle:"9.1 函数完整定义语法", content:`<h3 class="text-xl font-semibold mb-4">函数封装重复代码</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">返回值 函数名(参数列表){函数逻辑;return 返回数据;}</pre>`},
                    {sId:902, sTitle:"9.2 形参实参、函数返回值", content:`<h3 class="text-xl font-semibold mb-4">参数传递规则</h3><p class="text-gray-700 mb-4">调用函数传入真实数据为实参，函数接收变量为形参</p>`},
                    {sId:903, sTitle:"9.3 递归函数 阶乘计算", content:`<h3 class="text-xl font-semibold mb-4">函数自调用递归</h3><p class="text-gray-700 mb-3">阶乘公式 n! = n × (n-1)!</p><pre class="bg-gray-900 text-green-400 p-4 rounded-ds overflow-x-auto">int fact(int n){if(n == 1) return 1;return n * fact(n-1);}</pre>`}

            {

                sections:[
                    {sId:1001, sTitle:"10.1 取地址&、解引用*", content:`<h3 class="text-xl font-semibold mb-4">指针两个核心符号</h3><ul class="list-disc pl-6 space-y-2 text-gray-700 mb-4"><li>&变量：获取变量内存地址</li><li>*指针变量：访问地址中存储的值</li></ul>`},
                    {sId:1002, sTitle:"10.2 使用指针修改原始变量", content:`<h3 class="text-xl font-semibold mb-4">指针间接修改变量</h3><pre class="bg-gray-900 text-green-400 p-4 rounded-ds my-4">int a = 10;int *p = &a;*p = 99; // a的值被修改为99</pre>`},
                    {sId:1003, sTitle:"10.3 指针与数组结合使用", content:`<h3 class="text-xl font-semibold mb-4">数组名本质是首元素地址</h3><p class="text-gray-700 mb-4">指针自增可以依次遍历数组全部元素</p>`}

        // 密钥校验（密钥a467仅后端代码存在，页面无任何明文提示）
        function checkKey(){
            const input = document.getElementById('keyInput').value.trim();
            const errTip = document.getElementById('keyError');
            if(input === "a467"){
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                renderNav();
            }else{
                errTip.classList.remove('hidden');
            }
        }

        // 渲染左侧课程导航
        function renderNav(){
            const navBox = document.getElementById('lessonNav');
            let html = "";
            lessonData.forEach(lesson=>{
                html += `
                <div class="mb-3">
                    <div class="lesson-header flex items-center justify-between px-2 py-2 rounded-ds cursor-pointer hover:bg-gray-100" onclick="toggleLesson(${lesson.id})">
                        <span class="font-medium text-gray-800">${lesson.title}</span>
                        <i class="fa fa-chevron-down text-xs text-dsTextGray arrow-${lesson.id}"></i>
                    </div>
                    <div id="sub-${lesson.id}" class="sub-list hidden pl-3 mt-1 space-y-1">
                `;
                lesson.sections.forEach(sec=>{
                    html += `
                        <div class="section-item px-2 py-1.5 rounded cursor-pointer text-sm text-dsTextGray" onclick="openSection(${lesson.id},${sec.sId})">
                            ${sec.sTitle}
                        </div>
                    `;
                })
                html += `</div></div>`;
            })
            navBox.innerHTML = html;
        }

        // 展开/折叠课程小节
        function toggleLesson(lid){
            const subDom = document.getElementById(`sub-${lid}`);
            const arrow = document.querySelector(`.arrow-${lid}`);
            if(subDom.classList.contains('hidden')){
                subDom.classList.remove('hidden');
                arrow.classList.remove('fa-chevron-down');
                arrow.classList.add('fa-chevron-up');
            }else{
                subDom.classList.add('hidden');
                arrow.classList.remove('fa-chevron-up');
                arrow.classList.add('fa-chevron-down');
            }
        }

        // 加载小节内容并高亮
        function openSection(lid,sid){
            const lesson = lessonData.find(x=>x.id===lid);
            const sec = lesson.sections.find(x=>x.sId===sid);
            document.getElementById('pageTitle').innerText = `${lesson.title} - ${sec.sTitle}`;
            document.getElementById('contentBox').innerHTML = sec.content;
            document.querySelectorAll('.section-item').forEach(item=>item.classList.remove('nav-item-active'));
            event.target.classList.add('nav-item-active');
        }
    </script>
